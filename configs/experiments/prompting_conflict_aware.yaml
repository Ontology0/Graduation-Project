# Conflict-aware prompting — same retrieval/generation as base; different prompt_file
experiment_name: conflict_aware_prompting
model_name: microsoft/phi-2
dataset: null  # TODO: pilot / benchmark split
retrieval:
  backend: faiss
  top_k: 5
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  chunk_size: 512
  chunk_overlap: 128
prompt_file: configs/prompts/conflict_aware.md
generation:
  max_new_tokens: 256
  temperature: 0.2
  top_p: 0.9
  do_sample: false
  repetition_penalty: 1.05
training:
  enabled: false
evaluation:
  enabled: null
  metrics: []
notes: "Prompt-only arm; compare against base_rag with identical retrieval and generation settings."
