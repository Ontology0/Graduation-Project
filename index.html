<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team 3 Alltology - Graduation Project</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    body { max-width: 900px; margin: 40px auto; padding: 0 20px; background-color: #0d1117; } /* 배경색 어둡게 추가 */
    .markdown-body { background-color: transparent; color: #c9d1d9; }
  </style>
</head>
<body class="markdown-body">
  <div id="content">내용을 불러오는 중입니다...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script>
    fetch('README.md') 
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>파일을 불러올 수 없습니다. 파일명을 확인해 주세요.</p>';
      });
  </script>
</body>
</html>
