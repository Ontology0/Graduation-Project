# Base RAG configuration
experiment_name: base_rag
model_name: microsoft/phi-2
dataset: null  # TODO: benchmark / split (pending benchmark selection)
retrieval:
  backend: faiss
  top_k: 5
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  chunk_size: 512
  chunk_overlap: 128
prompt_file: configs/prompts/base_rag.md
generation:
  max_new_tokens: 256
  temperature: 0.2
  top_p: 0.9
  do_sample: false
  repetition_penalty: 1.05
training:
  enabled: false
evaluation:
  enabled: null  # TODO: enable after eval protocol is finalized
  metrics: []  # TODO: e.g. conflict resolution, faithfulness
notes: "Base RAG arm — no training, no conflict-aware prompting. Entrypoint: src/rag/pipeline.py"
